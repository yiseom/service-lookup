<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID ↔ 서비스명 조회</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }
  #app {
    width: 100%;
    max-width: 520px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    height: 680px;
    overflow: hidden;
  }
  #header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid #ebebeb;
    background: #fff;
    border-radius: 20px 20px 0 0;
  }
  #header h1 { font-size: 16px; font-weight: 700; color: #111; letter-spacing: -0.3px; }
  #header p  { font-size: 12px; color: #888; margin-top: 3px; }
  #msgs {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f7f8fa;
  }
  #msgs::-webkit-scrollbar { width: 4px; }
  #msgs::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  .row { display: flex; align-items: flex-end; gap: 8px; }
  .row.user { justify-content: flex-end; }
  .row.bot  { justify-content: flex-start; }
  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    border-radius: 18px;
  }
  .row.user .bubble {
    background: #4F46E5;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .row.bot .bubble {
    background: #fff;
    color: #111;
    border-bottom-left-radius: 4px;
    border: 1px solid #e8e8e8;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: #4F46E5;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px; color: #fff; font-weight: 700;
  }
  #footer {
    padding: 12px 14px;
    border-top: 1px solid #ebebeb;
    background: #fff;
    border-radius: 0 0 20px 20px;
    display: flex; align-items: center; gap: 8px;
  }
  #inp-wrap {
    flex: 1; display: flex; align-items: center;
    background: #f0f2f5; border-radius: 24px; padding: 0 14px;
    border: 1.5px solid transparent; transition: border-color 0.15s;
  }
  #inp-wrap:focus-within { border-color: #4F46E5; background: #fff; }
  #inp {
    flex: 1; border: none; background: transparent;
    font-size: 14px; color: #111; outline: none; padding: 10px 0;
  }
  #inp::placeholder { color: #aaa; }
  #btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: #4F46E5; color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, transform 0.1s;
  }
  #btn:hover { background: #4338CA; }
  #btn:active { transform: scale(0.93); }
  #btn svg { width: 18px; height: 18px; fill: #fff; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>ID ↔ 서비스명 조회</h1>
    <p>숫자(ID) 또는 서비스명 입력 — 카테고리 정보 포함 출력</p>
  </div>
  <div id="msgs"></div>
  <div id="footer">
    <div id="inp-wrap">
      <input id="inp" type="text" placeholder="ID 또는 서비스명 입력..." autocomplete="off" />
    </div>
    <button id="btn" aria-label="검색">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

const byId={},byName={};
D.forEach(r=>{
  if(!byId[r.id])byId[r.id]=[];
  byId[r.id].push(r);
  const k=r.name.toLowerCase();
  if(!byName[k])byName[k]=[];
  byName[k].push(r);
});
function cat(r){
  if(!r.cat1_id)return'';
  let s=r.cat1+'('+r.cat1_id+')';
  if(r.cat2_id)s+=', '+r.cat2+'('+r.cat2_id+')';
  return s;
}
function fmt(r){const c=cat(r);return r.id+' → '+r.name+(c?' ('+c+')':"");}
function search(q){
  q=q.trim();
  if(!q)return'검색어를 입력해주세요.';
  if(/^\d+$/.test(q)){
    const rows=byId[q];
    if(!rows)return'❌ ID '+q+'에 해당하는 항목이 없습니다.';
    if(rows.length===1)return'🔍 '+fmt(rows[0]);
    return'🔍 ID '+q+' → '+rows.length+'건:\n'+rows.map(r=>{const c=cat(r);return'• '+r.name+(c?' ('+c+')':'');}).join('\n');
  }
  const ql=q.toLowerCase();
  const ex=byName[ql];
  if(ex){
    if(ex.length===1)return'🔍 '+fmt(ex[0]);
    return'🔍 "'+q+'" 완전일치 '+ex.length+'건:\n'+ex.map(r=>'• '+fmt(r)).join('\n');
  }
  const m=D.filter(r=>r.name.toLowerCase().includes(ql));
  if(!m.length)return'❌ "'+q+'" 포함 항목이 없습니다.';
  if(m.length===1)return'🔍 '+fmt(m[0]);
  const lines=m.slice(0,25).map(r=>'• '+fmt(r)).join('\n');
  const more=m.length>25?'\n...외 '+(m.length-25)+'건 더 있음':'';
  return'🔍 "'+q+'" 포함 '+m.length+'건:\n'+lines+more;
}
function addMsg(text,role){
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');row.className='row '+role;
  if(role==='bot'){const av=document.createElement('div');av.className='avatar';av.textContent='S';row.appendChild(av);}
  const b=document.createElement('div');b.className='bubble';b.textContent=text;
  row.appendChild(b);msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}
function go(){
  const inp=document.getElementById('inp');const q=inp.value.trim();if(!q)return;
  addMsg(q,'user');inp.value='';
  setTimeout(()=>addMsg(search(q),'bot'),80);
}
addMsg('안녕하세요! ID나 서비스명을 입력하면 카테고리 정보와 함께 찾아드릴게요.\n\n예시: 7 → 가야금레슨 (과외(55), 음악(228))\n예시: 55 → cat1_과외, 발레레슨 2건\n예시: 테니스 → 관련 항목 목록','bot');
document.getElementById('btn').addEventListener('click',go);
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')go();});

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }
  #app {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    height: 640px;
    overflow: hidden;
  }
  #header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid #ebebeb;
    background: #fff;
    border-radius: 20px 20px 0 0;
  }
  #header h1 {
    font-size: 16px;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.3px;
  }
  #header p {
    font-size: 12px;
    color: #888;
    margin-top: 3px;
  }
  #msgs {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f7f8fa;
  }
  #msgs::-webkit-scrollbar { width: 4px; }
  #msgs::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  .row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .row.user { justify-content: flex-end; }
  .row.bot  { justify-content: flex-start; }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    border-radius: 18px;
  }
  .row.user .bubble {
    background: #4F46E5;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .row.bot .bubble {
    background: #fff;
    color: #111;
    border-bottom-left-radius: 4px;
    border: 1px solid #e8e8e8;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #4F46E5;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    color: #fff;
    font-weight: 700;
  }

  #footer {
    padding: 12px 14px;
    border-top: 1px solid #ebebeb;
    background: #fff;
    border-radius: 0 0 20px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #inp-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: #f0f2f5;
    border-radius: 24px;
    padding: 0 14px;
    border: 1.5px solid transparent;
    transition: border-color 0.15s;
  }
  #inp-wrap:focus-within {
    border-color: #4F46E5;
    background: #fff;
  }
  #inp {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    color: #111;
    outline: none;
    padding: 10px 0;
  }
  #inp::placeholder { color: #aaa; }
  #btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: #4F46E5;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  #btn:hover { background: #4338CA; }
  #btn:active { transform: scale(0.93); }
  #btn svg { width: 18px; height: 18px; fill: #fff; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>ID ↔ 서비스명 조회</h1>
    <p>숫자(ID) 또는 텍스트(서비스명)를 입력하세요 — 부분 검색 가능</p>
  </div>
  <div id="msgs"></div>
  <div id="footer">
    <div id="inp-wrap">
      <input id="inp" type="text" placeholder="ID 또는 서비스명 입력..." autocomplete="off" />
    </div>
    <button id="btn" aria-label="검색">

  </div>
</div>

// idToNames: { "55": ["cat1_과외", "발레레슨"], ... }
// nameToId:  { "cat1_과외": "55", ... }
const idToNames = {}, nameToId = {};
RAW.split('\n').forEach(line => {
  const parts = line.split('\t');
  if (parts.length >= 2) {
    const id = parts[0].trim(), name = parts[1].trim();
    if (id && name) {
      if (!idToNames[id]) idToNames[id] = [];
      idToNames[id].push(name);
      nameToId[name.toLowerCase()] = id;
    }
  }
});

// 텍스트 검색용 플랫 리스트: [{id, name}, ...]
const allPairs = [];
Object.entries(idToNames).forEach(([id, names]) => {
  names.forEach(name => allPairs.push({ id, name }));
});

function search(q) {
  q = q.trim();
  if (!q) return '검색어를 입력해주세요.';

  // 숫자 → 이름(들)
  if (/^\d+$/.test(q)) {
    const names = idToNames[q];
    if (!names) return `❌ ID ${q}에 해당하는 항목이 없습니다.`;
    if (names.length === 1) return `🔍 ID ${q} → ${names[0]}`;
    return `🔍 ID ${q} → ${names.length}건:\n${names.map(n => `• ${n}`).join('\n')}`;
  }

  // 텍스트 → ID (완전일치 우선)
  const ql = q.toLowerCase();
  const exactId = nameToId[ql];
  if (exactId) {
    const names = idToNames[exactId];
    const others = names.filter(n => n.toLowerCase() !== ql);
    if (others.length === 0) return `🔍 "${q}" → ID: ${exactId}`;
    return `🔍 "${q}" → ID: ${exactId}\n(같은 ID의 다른 항목: ${others.join(', ')})`;
  }

  // 부분 검색
  const matches = allPairs.filter(p => p.name.toLowerCase().includes(ql));
  if (!matches.length) return `❌ "${q}" 포함 항목이 없습니다.`;
  if (matches.length === 1) return `🔍 "${matches[0].name}" → ID: ${matches[0].id}`;
  const lines = matches.slice(0, 20).map(p => `• ${p.id}\t${p.name}`).join('\n');
  const more = matches.length > 20 ? `\n...외 ${matches.length - 20}건 더 있음` : '';
  return `🔍 "${q}" 포함 ${matches.length}건:\n${lines}${more}`;
}

function addMsg(text, role) {
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'row ' + role;
  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = 'S';
    row.appendChild(av);
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function handleSearch() {
  const inp = document.getElementById('inp');
  const q = inp.value.trim();
  if (!q) return;
  addMsg(q, 'user');
  inp.value = '';
  setTimeout(() => addMsg(search(q), 'bot'), 80);
}

addMsg('안녕하세요! ID나 서비스명을 입력하면 바로 찾아드릴게요.\n\n예시: 103 → 테니스레슨\n예시: 테니스 → 관련 ID 목록', 'bot');

document.getElementById('btn').addEventListener('click', handleSearch);
document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSearch();
});
